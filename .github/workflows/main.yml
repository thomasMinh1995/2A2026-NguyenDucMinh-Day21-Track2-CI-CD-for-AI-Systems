name: MLOps Pipeline

on:
  push:
    branches: [master]
    paths:
      - "data/**.dvc"
      - "src/**.py"
      - "params.yaml"
      - "requirements.txt"
      - ".dvc/**"
      - ".github/workflows/mlops.yml"
  workflow_dispatch:

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[s3]"

      - name: Run pytest
        run: pytest tests/ -v

  train:
    name: Train Model
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[s3]"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Debug DVC config
        run: |
          echo "Current directory:"
          pwd

          echo "Git files:"
          git ls-files | grep -E "data/.*\.dvc|\.dvc/config|\.dvcignore" || true

          echo "DVC version:"
          dvc --version

          echo "DVC remote list:"
          dvc remote list

          echo ".dvc/config:"
          cat .dvc/config

          echo "Data directory before dvc pull:"
          ls -lah data || true

      - name: Pull data with DVC
        run: |
          dvc pull -v

          echo "Data directory after dvc pull:"
          ls -lah data

          test -f data/train_phase1.csv
          test -f data/eval.csv
          test -f data/train_phase2.csv

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          accuracy=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$accuracy" >> "$GITHUB_OUTPUT"
          echo "Read accuracy: $accuracy"

      - name: Upload model to S3
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          python - <<'EOF'
          import boto3
          import os

          bucket = os.environ["S3_BUCKET"]
          s3 = boto3.client("s3")
          s3.upload_file("models/model.pkl", bucket, "models/model.pkl")
          print("Successfully uploaded models/model.pkl to S3.")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  eval:
    name: Evaluate Model
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate accuracy >= 0.70
        run: |
          accuracy="${{ needs.train.outputs.accuracy }}"
          echo "Model accuracy: $accuracy"
          python -c "import sys; sys.exit(0 if float('$accuracy') >= 0.70 else 1)"

  deploy:
    name: Deploy to EC2
    needs: eval
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            PROJECT_DIR="/home/ec2-user/2A2026-NguyenDucMinh-Day21-Track2-CI-CD-for-AI-Systems"
            REPO_URL="https://github.com/thomasMinh1995/2A2026-NguyenDucMinh-Day21-Track2-CI-CD-for-AI-Systems.git"

            if [ ! -d "$PROJECT_DIR/.git" ]; then
              rm -rf "$PROJECT_DIR"
              git clone "$REPO_URL" "$PROJECT_DIR"
            else
              cd "$PROJECT_DIR"
              git pull origin master
            fi

            cd "$PROJECT_DIR"

            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi

            .venv/bin/python -m pip install --upgrade pip
            .venv/bin/pip install -r requirements.txt

            mkdir -p /home/ec2-user/models

            sudo tee /etc/systemd/system/mlops-serve.service > /dev/null <<EOF
            [Unit]
            Description=MLOps Model Inference Server
            After=network.target

            [Service]
            User=ec2-user
            WorkingDirectory=$PROJECT_DIR
            Environment="AWS_S3_BUCKET=${{ secrets.S3_BUCKET }}"
            Environment="MODEL_PATH=/home/ec2-user/models/model.pkl"
            ExecStart=$PROJECT_DIR/.venv/bin/uvicorn src.serve:app --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable mlops-serve
            sudo systemctl restart mlops-serve

            sleep 5
            sudo systemctl status mlops-serve --no-pager
            curl --fail http://localhost:8000/health
